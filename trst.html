

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
.container { padding: 1.5rem 0; font-family: var(--font-sans); }
.header { display: flex; align-items: center; gap: 10px; margin-bottom: 1.5rem; }
.header h1 { font-size: 18px; font-weight: 500; color: var(--color-text-primary); }
.api-section { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1.25rem; margin-bottom: 1rem; }
.field-label { font-size: 12px; color: var(--color-text-secondary); margin-bottom: 5px; font-weight: 500; }
.api-row { display: flex; gap: 8px; align-items: center; margin-bottom: 10px; }
.api-input { flex: 1; padding: 8px 12px; font-size: 13px; font-family: var(--font-mono); border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); color: var(--color-text-primary); outline: none; }
.api-input:focus { border-color: var(--color-border-primary); }
.toggle-eye { background: none; border: none; cursor: pointer; color: var(--color-text-secondary); padding: 0 4px; display: flex; align-items: center; }
.btn { padding: 8px 16px; font-size: 13px; font-weight: 500; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: transparent; color: var(--color-text-primary); cursor: pointer; transition: background 0.15s, transform 0.1s; white-space: nowrap; }
.btn:hover { background: var(--color-background-secondary); }
.btn:active { transform: scale(0.98); }
.btn-primary { background: var(--color-text-primary); color: var(--color-background-primary); border-color: var(--color-text-primary); width: 100%; margin-top: 4px; padding: 10px; }
.btn-primary:hover { opacity: 0.85; background: var(--color-text-primary); }
.btn-primary:disabled { opacity: 0.4; cursor: not-allowed; transform: none; }
.hint { font-size: 11px; color: var(--color-text-tertiary); margin-top: 8px; line-height: 1.6; }
.hint a { color: var(--color-text-info); text-decoration: none; }
.status { padding: 10px 14px; border-radius: var(--border-radius-md); font-size: 13px; margin-bottom: 1rem; display: none; }
.status.error { background: var(--color-background-danger); color: var(--color-text-danger); border: 0.5px solid var(--color-border-danger); display: block; }
.status.loading { background: var(--color-background-secondary); color: var(--color-text-secondary); border: 0.5px solid var(--color-border-tertiary); display: block; }
.status.success { background: var(--color-background-success); color: var(--color-text-success); border: 0.5px solid var(--color-border-success); display: block; }
.toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
.search-input { flex: 1; min-width: 140px; padding: 7px 12px; font-size: 13px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); color: var(--color-text-primary); outline: none; }
.filter-select { padding: 7px 10px; font-size: 13px; border: 0.5px solid var(--color-border-secondary); border-radius: var(--border-radius-md); background: var(--color-background-secondary); color: var(--color-text-primary); outline: none; cursor: pointer; }
.count-badge { font-size: 12px; color: var(--color-text-tertiary); margin-left: auto; }
.pages-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(210px, 1fr)); gap: 10px; }
.page-card { background: var(--color-background-primary); border: 0.5px solid var(--color-border-tertiary); border-radius: var(--border-radius-lg); padding: 1rem 1.1rem; cursor: pointer; transition: border-color 0.15s, transform 0.1s; display: flex; flex-direction: column; gap: 6px; text-decoration: none; }
.page-card:hover { border-color: var(--color-border-secondary); transform: translateY(-1px); }
.page-emoji { font-size: 20px; width: 32px; height: 32px; display: flex; align-items: center; justify-content: center; border-radius: 6px; background: var(--color-background-secondary); flex-shrink: 0; }
.page-icon-default { width: 32px; height: 32px; background: var(--color-background-secondary); border-radius: 6px; display: flex; align-items: center; justify-content: center; }
.page-title { font-size: 13px; font-weight: 500; color: var(--color-text-primary); line-height: 1.4; word-break: break-word; margin-top: 4px; }
.page-meta { font-size: 11px; color: var(--color-text-tertiary); display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 2px; }
.type-badge { font-size: 10px; padding: 2px 7px; border-radius: 100px; font-weight: 500; }
.type-page { background: #E6F1FB; color: #0C447C; }
.type-database { background: #EEEDFE; color: #3C3489; }
.empty-state { text-align: center; padding: 3rem 1rem; color: var(--color-text-tertiary); font-size: 14px; grid-column: 1/-1; }
</style>

<div class="container">
  <div class="header">
    <svg width="26" height="26" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
      <rect width="100" height="100" rx="18" fill="#1a1a1a"/>
      <path d="M23 19C19.7 19.3 17 22.2 17 25.7V74.3C17 77.8 19.7 80.7 23 81L62 84C65.5 84.3 68.5 81.6 68.5 78.1V29.9C68.5 26.6 66.1 23.8 62.8 23.4L26 19.1C25.2 19 24 18.8 23 19Z" fill="white"/>
      <rect x="72" y="30" width="9" height="44" rx="3" fill="white"/>
    </svg>
    <h1>Notion 페이지 탐색기</h1>
  </div>

  <div class="api-section">
    <div class="field-label">Notion API 키</div>
    <div class="api-row">
      <input class="api-input" id="notionKey" type="password" placeholder="secret_xxxxxxxxxxxxxxxxxxxx" />
      <button class="toggle-eye" id="toggleNotion">
        <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <button class="btn btn-primary" id="connectBtn" onclick="fetchPages()">연결하기</button>
    <p class="hint">
      <a href="https://www.notion.so/my-integrations" target="_blank">notion.so/my-integrations</a>에서 API 키 발급 후, 조회할 페이지에 통합(Integration)을 공유해주세요.<br>
      ※ API 키는 Claude를 통해 안전하게 Notion에 전달됩니다.
    </p>
  </div>

  <div class="status" id="status"></div>

  <div id="results" style="display:none;">
    <div class="toolbar">
      <input class="search-input" id="searchInput" type="text" placeholder="페이지 검색..." oninput="filterPages()" />
      <select class="filter-select" id="typeFilter" onchange="filterPages()">
        <option value="all">전체 유형</option>
        <option value="page">페이지</option>
        <option value="database">데이터베이스</option>
      </select>
      <span class="count-badge" id="countBadge"></span>
    </div>
    <div class="pages-grid" id="pagesGrid"></div>
  </div>
</div>

<script>
let allPages = [];

document.getElementById('notionKey').addEventListener('keydown', e => { if (e.key === 'Enter') fetchPages(); });

document.getElementById('toggleNotion').addEventListener('click', () => {
  const inp = document.getElementById('notionKey');
  inp.type = inp.type === 'password' ? 'text' : 'password';
});

function showStatus(type, msg) {
  const el = document.getElementById('status');
  el.className = 'status ' + type;
  el.textContent = msg;
}

async function fetchPages() {
  const notionKey = document.getElementById('notionKey').value.trim();
  if (!notionKey) { showStatus('error', 'Notion API 키를 입력해주세요.'); return; }
  if (!notionKey.startsWith('secret_') && !notionKey.startsWith('ntn_')) {
    showStatus('error', 'API 키 형식이 올바르지 않습니다. secret_ 또는 ntn_ 으로 시작해야 합니다.');
    return;
  }

  const btn = document.getElementById('connectBtn');
  btn.disabled = true;
  btn.textContent = '불러오는 중...';
  showStatus('loading', 'Claude를 통해 Notion 페이지를 불러오는 중입니다...');
  document.getElementById('results').style.display = 'none';

  const prompt = `You are a Notion API assistant. Make a POST request to the Notion API search endpoint and return the results as JSON.

Call this endpoint:
URL: https://api.notion.com/v1/search
Method: POST
Headers:
  Authorization: Bearer ${notionKey}
  Notion-Version: 2022-06-28
  Content-Type: application/json
Body: {"page_size": 100}

Return ONLY a valid JSON object with this exact structure (no markdown, no explanation):
{
  "success": true,
  "results": [...array of page/database objects from the API response...],
  "has_more": false,
  "error": null
}

If there's an error, return:
{
  "success": false,
  "results": [],
  "has_more": false,
  "error": "error message here"
}

Do not include any text outside the JSON object.`;

  try {
    const res = await fetch('https://api.anthropic.com/v1/messages', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: 'claude-sonnet-4-20250514',
        max_tokens: 8000,
        tools: [{ type: 'web_search_20250305', name: 'web_search' }],
        messages: [{ role: 'user', content: prompt }]
      })
    });

    const data = await res.json();

    // Extract text from response
    let rawText = '';
    for (const block of data.content || []) {
      if (block.type === 'text') rawText += block.text;
    }

    // Try to parse JSON from response
    const jsonMatch = rawText.match(/\{[\s\S]*\}/);
    if (!jsonMatch) throw new Error('응답에서 JSON을 찾을 수 없습니다.');

    const parsed = JSON.parse(jsonMatch[0]);

    if (!parsed.success) {
      throw new Error(parsed.error || '알 수 없는 오류');
    }

    allPages = parsed.results || [];
    btn.disabled = false;
    btn.textContent = '연결하기';

    if (allPages.length === 0) {
      showStatus('success', '연결 성공! 공유된 페이지가 없습니다. 통합(Integration)을 페이지에 공유해주세요.');
    } else {
      showStatus('success', `연결 성공! 총 ${allPages.length}개의 페이지/데이터베이스를 불러왔습니다.`);
      document.getElementById('results').style.display = 'block';
      filterPages();
    }

  } catch (err) {
    btn.disabled = false;
    btn.textContent = '연결하기';
    showStatus('error', '오류: ' + err.message);
  }
}

function getTitle(page) {
  if (page.object === 'database') {
    const t = page.title;
    return Array.isArray(t) && t.length ? t.map(x => x.plain_text).join('') || '(제목 없음)' : '(제목 없는 데이터베이스)';
  }
  const props = page.properties || {};
  for (const key of Object.keys(props)) {
    const p = props[key];
    if (p.type === 'title' && p.title) return p.title.map(x => x.plain_text).join('') || '(제목 없음)';
  }
  return '(제목 없음)';
}

function getIcon(page) {
  return page.icon?.type === 'emoji' ? page.icon.emoji : null;
}

function getLastEdited(page) {
  return new Date(page.last_edited_time).toLocaleDateString('ko-KR', { year: 'numeric', month: 'short', day: 'numeric' });
}

function filterPages() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const type = document.getElementById('typeFilter').value;
  const filtered = allPages.filter(p => {
    const title = getTitle(p).toLowerCase();
    return (!q || title.includes(q)) && (type === 'all' || p.object === type);
  });
  document.getElementById('countBadge').textContent = filtered.length + '개';
  renderPages(filtered);
}

function renderPages(pages) {
  const grid = document.getElementById('pagesGrid');
  if (!pages.length) {
    grid.innerHTML = '<div class="empty-state">검색 결과가 없습니다.</div>';
    return;
  }
  grid.innerHTML = pages.map(page => {
    const title = getTitle(page);
    const icon = getIcon(page);
    const type = page.object;
    const url = page.url;
    const date = getLastEdited(page);
    const iconHtml = icon
      ? `<div class="page-emoji">${icon}</div>`
      : `<div class="page-icon-default"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" opacity="0.35"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="7" y1="8" x2="17" y2="8"/><line x1="7" y1="12" x2="14" y2="12"/><line x1="7" y1="16" x2="11" y2="16"/></svg></div>`;
    const badge = type === 'database'
      ? `<span class="type-badge type-database">데이터베이스</span>`
      : `<span class="type-badge type-page">페이지</span>`;
    return `<a class="page-card" href="${esc(url)}" target="_blank">
      ${iconHtml}
      <div class="page-title">${esc(title)}</div>
      <div class="page-meta">${badge}<span>${date}</span></div>
    </a>`;
  }).join('');
}

function esc(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
</script>
