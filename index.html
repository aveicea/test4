<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Notion 페이지 탐색기</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #ffffff;
      --bg-secondary: #f7f7f5;
      --bg-tertiary: #f1f0ec;
      --text: #1a1a1a;
      --text-secondary: #6b6b6b;
      --text-tertiary: #999;
      --border: rgba(0,0,0,0.1);
      --border-hover: rgba(0,0,0,0.2);
      --radius: 10px;
      --radius-sm: 6px;
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --bg: #1a1a1a;
        --bg-secondary: #242424;
        --bg-tertiary: #2c2c2c;
        --text: #f0f0f0;
        --text-secondary: #aaa;
        --text-tertiary: #666;
        --border: rgba(255,255,255,0.1);
        --border-hover: rgba(255,255,255,0.2);
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--bg-tertiary);
      color: var(--text);
      min-height: 100vh;
      padding: 2rem 1rem;
    }

    .wrapper { max-width: 900px; margin: 0 auto; }

    /* Header */
    .header { display: flex; align-items: center; gap: 12px; margin-bottom: 2rem; }
    .header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.3px; }
    .header p { font-size: 13px; color: var(--text-secondary); margin-top: 2px; }

    /* Card */
    .card { background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius); padding: 1.5rem; margin-bottom: 1rem; }
    .field-label { font-size: 12px; font-weight: 600; color: var(--text-secondary); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 6px; }
    .input-row { display: flex; gap: 8px; align-items: center; }

    input[type="text"], input[type="password"] {
      flex: 1; padding: 10px 14px; font-size: 14px;
      font-family: 'SF Mono', 'Fira Code', monospace;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      background: var(--bg-secondary); color: var(--text); outline: none; transition: border-color 0.15s;
    }
    input:focus { border-color: var(--border-hover); }

    .eye-btn {
      background: none; border: 1px solid var(--border); border-radius: var(--radius-sm);
      width: 38px; height: 38px; display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text-secondary); transition: background 0.1s;
    }
    .eye-btn:hover { background: var(--bg-secondary); }

    .connect-btn {
      width: 100%; margin-top: 12px; padding: 11px; font-size: 14px; font-weight: 600;
      border: none; border-radius: var(--radius-sm); background: var(--text); color: var(--bg);
      cursor: pointer; transition: opacity 0.15s, transform 0.1s;
    }
    .connect-btn:hover { opacity: 0.85; }
    .connect-btn:active { transform: scale(0.99); }
    .connect-btn:disabled { opacity: 0.35; cursor: not-allowed; }

    .hint { font-size: 12px; color: var(--text-tertiary); margin-top: 10px; line-height: 1.7; }
    .hint a { color: #2563eb; text-decoration: none; }
    .hint a:hover { text-decoration: underline; }

    /* Status */
    .status { padding: 12px 16px; border-radius: var(--radius-sm); font-size: 13px; margin-bottom: 1rem; display: none; line-height: 1.5; }
    .status.error   { background: #fff1f0; color: #b91c1c; border: 1px solid #fecaca; display: block; }
    .status.loading { background: var(--bg-secondary); color: var(--text-secondary); border: 1px solid var(--border); display: block; }
    .status.success { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; display: block; }

    @media (prefers-color-scheme: dark) {
      .status.error   { background: #2c1515; color: #f87171; border-color: #7f1d1d; }
      .status.success { background: #0f2a1a; color: #4ade80; border-color: #14532d; }
    }

    /* Toolbar */
    .toolbar { display: flex; gap: 8px; align-items: center; margin-bottom: 1rem; flex-wrap: wrap; }
    .search-wrap { position: relative; flex: 1; min-width: 160px; }
    .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); color: var(--text-tertiary); pointer-events: none; }
    .search-input { width: 100%; padding: 9px 12px 9px 32px; font-size: 13px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); outline: none; font-family: inherit; }
    .search-input:focus { border-color: var(--border-hover); }
    select { padding: 9px 12px; font-size: 13px; border: 1px solid var(--border); border-radius: var(--radius-sm); background: var(--bg); color: var(--text); outline: none; cursor: pointer; font-family: inherit; }
    .count { font-size: 12px; color: var(--text-tertiary); margin-left: auto; white-space: nowrap; }

    /* Grid */
    .pages-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
    .page-card {
      background: var(--bg); border: 1px solid var(--border); border-radius: var(--radius);
      padding: 1rem 1.1rem; display: flex; flex-direction: column; gap: 6px;
      cursor: pointer; transition: border-color 0.15s, transform 0.12s, box-shadow 0.12s;
    }
    .page-card:hover { border-color: var(--border-hover); transform: translateY(-2px); box-shadow: 0 4px 16px rgba(0,0,0,0.06); }
    .page-icon { width: 34px; height: 34px; border-radius: 7px; background: var(--bg-secondary); display: flex; align-items: center; justify-content: center; font-size: 18px; flex-shrink: 0; }
    .page-title { font-size: 13px; font-weight: 500; color: var(--text); line-height: 1.4; word-break: break-word; margin-top: 2px; }
    .page-meta { display: flex; gap: 6px; align-items: center; flex-wrap: wrap; margin-top: 2px; }
    .badge { font-size: 10px; padding: 2px 8px; border-radius: 100px; font-weight: 600; }
    .badge-page { background: #dbeafe; color: #1d4ed8; }
    .badge-db   { background: #ede9fe; color: #6d28d9; }
    @media (prefers-color-scheme: dark) {
      .badge-page { background: #1e3a5f; color: #93c5fd; }
      .badge-db   { background: #2e1f5e; color: #c4b5fd; }
    }
    .page-date { font-size: 11px; color: var(--text-tertiary); }
    .empty { grid-column: 1 / -1; text-align: center; padding: 3rem 1rem; color: var(--text-tertiary); font-size: 14px; }

    /* ── Page Detail Overlay ── */
    .page-detail {
      position: fixed; inset: 0; background: var(--bg); z-index: 100;
      overflow-y: auto; opacity: 0; pointer-events: none;
      transition: opacity 0.18s ease;
    }
    .page-detail.open { opacity: 1; pointer-events: auto; }

    .detail-header {
      position: sticky; top: 0; background: var(--bg);
      border-bottom: 1px solid var(--border);
      padding: 10px 24px; display: flex; align-items: center; gap: 10px; z-index: 10;
    }
    .back-btn {
      display: flex; align-items: center; gap: 6px;
      background: none; border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 6px 12px; font-size: 13px; cursor: pointer; color: var(--text-secondary);
      transition: background 0.1s; white-space: nowrap; flex-shrink: 0;
    }
    .back-btn:hover { background: var(--bg-secondary); }

    .breadcrumb { display: flex; align-items: center; gap: 4px; font-size: 12px; color: var(--text-tertiary); overflow: hidden; flex: 1; }
    .crumb-item { cursor: pointer; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
    .crumb-item:hover { color: var(--text); }
    .crumb-sep { flex-shrink: 0; }

    .notion-link-btn {
      display: flex; align-items: center; gap: 5px; margin-left: auto;
      font-size: 12px; color: var(--text-tertiary); text-decoration: none;
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 5px 10px; white-space: nowrap; flex-shrink: 0; transition: background 0.1s;
    }
    .notion-link-btn:hover { background: var(--bg-secondary); color: var(--text); }

    .detail-body { max-width: 720px; margin: 0 auto; padding: 48px 24px 96px; }

    .detail-page-header { margin-bottom: 32px; }
    .detail-page-icon { font-size: 52px; line-height: 1; margin-bottom: 12px; }
    .detail-page-title { font-size: 36px; font-weight: 700; letter-spacing: -0.5px; line-height: 1.3; }

    /* ── Notion Block Styles ── */
    .notion-p { font-size: 15px; line-height: 1.75; margin-bottom: 2px; min-height: 1.75em; color: var(--text); }
    .notion-h1 { font-size: 28px; font-weight: 700; letter-spacing: -0.3px; margin: 28px 0 4px; padding-bottom: 6px; border-bottom: 1px solid var(--border); }
    .notion-h2 { font-size: 22px; font-weight: 600; letter-spacing: -0.2px; margin: 22px 0 4px; }
    .notion-h3 { font-size: 18px; font-weight: 600; margin: 18px 0 4px; }

    .notion-ul, .notion-ol { margin: 4px 0 4px 24px; }
    .notion-ul li, .notion-ol li { font-size: 15px; line-height: 1.75; margin-bottom: 2px; padding-left: 4px; }
    .block-children { margin-left: 24px; }

    .notion-todo { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 4px; font-size: 15px; line-height: 1.75; }
    .notion-todo input[type="checkbox"] { margin-top: 4px; flex-shrink: 0; cursor: default; }
    .todo-done { text-decoration: line-through; color: var(--text-secondary); }

    .notion-toggle { font-size: 15px; line-height: 1.75; margin-bottom: 4px; }
    .notion-toggle > summary { cursor: pointer; list-style: none; display: flex; align-items: flex-start; gap: 6px; }
    .notion-toggle > summary::before { content: '▶'; font-size: 10px; color: var(--text-tertiary); flex-shrink: 0; margin-top: 6px; transition: transform 0.18s; }
    .notion-toggle[open] > summary::before { transform: rotate(90deg); }
    .notion-toggle > summary::-webkit-details-marker { display: none; }
    .notion-toggle > .block-children { margin-top: 4px; }

    .notion-code {
      background: var(--bg-secondary); border: 1px solid var(--border);
      border-radius: var(--radius-sm); padding: 16px; margin: 8px 0;
      overflow-x: auto; font-size: 13px;
      font-family: 'SF Mono', 'Fira Code', 'Cascadia Code', monospace; line-height: 1.65;
    }
    .notion-code::before { content: attr(data-lang); display: block; font-size: 11px; color: var(--text-tertiary); margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .notion-code:not([data-lang])::before, .notion-code[data-lang=""]::before { display: none; }
    .inline-code { background: rgba(135,131,120,0.15); border-radius: 3px; padding: 2px 5px; font-size: 87%; font-family: 'SF Mono', 'Fira Code', monospace; }

    .notion-quote { border-left: 3px solid var(--text); padding: 4px 0 4px 16px; margin: 8px 0; font-size: 15px; line-height: 1.75; color: var(--text-secondary); }

    .notion-callout {
      display: flex; gap: 12px; background: var(--bg-secondary);
      border-radius: var(--radius-sm); padding: 14px 16px; margin: 8px 0;
      border: 1px solid var(--border);
    }
    .callout-icon { font-size: 20px; flex-shrink: 0; line-height: 1.5; }
    .callout-body { font-size: 15px; line-height: 1.75; flex: 1; }

    .notion-divider { border: none; border-top: 1px solid var(--border); margin: 16px 0; }

    .notion-image { margin: 12px 0; }
    .notion-image img { max-width: 100%; border-radius: var(--radius-sm); display: block; }
    .notion-image figcaption { font-size: 12px; color: var(--text-tertiary); margin-top: 6px; text-align: center; }

    .notion-child-page {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 12px; border-radius: var(--radius-sm); margin: 4px 0;
      font-size: 14px; cursor: pointer; border: 1px solid transparent;
      transition: background 0.1s, border-color 0.1s;
    }
    .notion-child-page:hover { background: var(--bg-secondary); border-color: var(--border); }

    .notion-bookmark {
      display: block; border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 12px 16px; margin: 8px 0; text-decoration: none; color: #2563eb;
      font-size: 13px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
      transition: background 0.1s;
    }
    .notion-bookmark:hover { background: var(--bg-secondary); }

    .notion-embed, .notion-media-link {
      border: 1px solid var(--border); border-radius: var(--radius-sm);
      padding: 12px 16px; margin: 8px 0; font-size: 13px;
    }
    .notion-embed a, .notion-media-link a { color: #2563eb; text-decoration: none; }
    .notion-embed a:hover, .notion-media-link a:hover { text-decoration: underline; }

    .notion-table-wrap { overflow-x: auto; margin: 12px 0; border-radius: var(--radius-sm); border: 1px solid var(--border); }
    .notion-table { border-collapse: collapse; width: 100%; font-size: 14px; }
    .notion-table td, .notion-table th { border-right: 1px solid var(--border); border-bottom: 1px solid var(--border); padding: 8px 12px; text-align: left; line-height: 1.5; }
    .notion-table td:last-child, .notion-table th:last-child { border-right: none; }
    .notion-table tr:last-child td, .notion-table tr:last-child th { border-bottom: none; }
    .notion-table th { background: var(--bg-secondary); font-weight: 600; }

    .notion-columns { display: flex; gap: 16px; margin: 8px 0; }
    .notion-column { flex: 1; min-width: 0; }

    .notion-equation { font-family: 'SF Mono', monospace; font-size: 14px; color: var(--text-secondary); padding: 4px 0; }

    .detail-loading { text-align: center; padding: 64px 24px; color: var(--text-tertiary); font-size: 14px; }
    .detail-empty { text-align: center; padding: 64px 24px; color: var(--text-tertiary); font-size: 14px; }
    .detail-error { color: #b91c1c; font-size: 14px; padding: 12px 0; }
  </style>
</head>
<body>
  <div class="wrapper">
    <div class="header">
      <svg width="32" height="32" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
        <rect width="100" height="100" rx="20" fill="#1a1a1a"/>
        <path d="M22 19C18.7 19.3 16 22.2 16 25.7V74.3C16 77.8 18.7 80.7 22 81L61 84C64.5 84.3 67.5 81.6 67.5 78.1V29.9C67.5 26.6 65.1 23.8 61.8 23.4L25 19.1C24.2 19 23 18.8 22 19Z" fill="white"/>
        <rect x="71" y="30" width="9" height="44" rx="3" fill="white"/>
      </svg>
      <div>
        <h1>Notion 페이지 탐색기</h1>
        <p>API 키로 연결된 모든 페이지를 확인하세요</p>
      </div>
    </div>

    <div class="card">
      <div class="field-label">Notion API 키</div>
      <div class="input-row">
        <input id="notionKey" type="password" placeholder="secret_xxxxxxxxxxxxxxxxxxxx" />
        <button class="eye-btn" id="toggleEye" title="보기/숨기기">
          <svg id="eyeIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/>
            <circle cx="12" cy="12" r="3"/>
          </svg>
        </button>
      </div>
      <button class="connect-btn" id="connectBtn" onclick="fetchPages()">연결하기</button>
      <p class="hint">
        <a href="https://www.notion.so/my-integrations" target="_blank">notion.so/my-integrations</a>에서 API 키를 발급 받으세요.<br>
        조회할 Notion 페이지에 통합(Integration)을 공유해야 페이지가 보입니다.
      </p>
    </div>

    <div class="status" id="status"></div>

    <div id="results" style="display:none;">
      <div class="toolbar">
        <div class="search-wrap">
          <svg class="search-icon" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input class="search-input" id="searchInput" type="text" placeholder="페이지 검색..." oninput="filterPages()" />
        </div>
        <select id="typeFilter" onchange="filterPages()">
          <option value="all">전체 유형</option>
          <option value="page">페이지</option>
          <option value="database">데이터베이스</option>
        </select>
        <span class="count" id="countBadge"></span>
      </div>
      <div class="pages-grid" id="pagesGrid"></div>
    </div>
  </div>

  <!-- Page Detail Overlay -->
  <div id="pageDetail" class="page-detail">
    <div class="detail-header">
      <button class="back-btn" onclick="navigateBack()">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <polyline points="15 18 9 12 15 6"/>
        </svg>
        <span id="backLabel">목록으로</span>
      </button>
      <div class="breadcrumb" id="breadcrumb"></div>
      <a id="detailNotionLink" class="notion-link-btn" href="#" target="_blank" rel="noopener noreferrer" style="display:none;">
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
        Notion에서 열기
      </a>
    </div>
    <div class="detail-body">
      <div class="detail-page-header">
        <div class="detail-page-icon" id="detailIcon"></div>
        <h1 class="detail-page-title" id="detailTitle"></h1>
      </div>
      <div id="detailContent"></div>
    </div>
  </div>

  <script>
    let allPages = [];
    let displayedPages = [];
    const navStack = [];

    const NOTION_COLORS = {
      gray: '#9b9a97', brown: '#64473a', orange: '#d9730d',
      yellow: '#dfab01', green: '#0f7b6c', blue: '#0b6e99',
      purple: '#6940a5', pink: '#ad1a72', red: '#e03e3e',
    };

    document.getElementById('notionKey').addEventListener('keydown', e => {
      if (e.key === 'Enter') fetchPages();
    });

    document.getElementById('toggleEye').addEventListener('click', () => {
      const inp = document.getElementById('notionKey');
      const icon = document.getElementById('eyeIcon');
      if (inp.type === 'password') {
        inp.type = 'text';
        icon.innerHTML = '<path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/>';
      } else {
        inp.type = 'password';
        icon.innerHTML = '<path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>';
      }
    });

    document.addEventListener('keydown', e => {
      if (e.key === 'Escape' && document.getElementById('pageDetail').classList.contains('open')) {
        navigateBack();
      }
    });

    function showStatus(type, msg) {
      const el = document.getElementById('status');
      el.className = 'status ' + type;
      el.textContent = msg;
    }

    async function fetchPages() {
      const notionKey = document.getElementById('notionKey').value.trim();
      if (!notionKey) { showStatus('error', 'Notion API 키를 입력해주세요.'); return; }
      if (!notionKey.startsWith('secret_') && !notionKey.startsWith('ntn_')) {
        showStatus('error', 'API 키 형식이 올바르지 않습니다. secret_ 또는 ntn_ 으로 시작해야 합니다.');
        return;
      }

      const btn = document.getElementById('connectBtn');
      btn.disabled = true;
      btn.textContent = '불러오는 중...';
      showStatus('loading', 'Notion 페이지를 불러오는 중입니다...');
      document.getElementById('results').style.display = 'none';

      try {
        const res = await fetch('/api/notion', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ notionKey }),
        });

        const data = await res.json();
        if (!data.success) throw new Error(data.error || '알 수 없는 오류');

        allPages = data.results || [];
        btn.disabled = false;
        btn.textContent = '연결하기';

        if (allPages.length === 0) {
          showStatus('success', '연결 성공! 공유된 페이지가 없습니다. 통합(Integration)을 페이지에 공유해주세요.');
        } else {
          showStatus('success', `연결 성공! 총 ${allPages.length}개의 페이지/데이터베이스를 불러왔습니다.`);
          document.getElementById('results').style.display = 'block';
          filterPages();
        }
      } catch (err) {
        btn.disabled = false;
        btn.textContent = '연결하기';
        showStatus('error', '오류: ' + err.message);
      }
    }

    function getTitle(page) {
      if (page.object === 'database') {
        const t = page.title;
        return Array.isArray(t) && t.length ? t.map(x => x.plain_text).join('') || '(제목 없음)' : '(제목 없는 데이터베이스)';
      }
      const props = page.properties || {};
      for (const key of Object.keys(props)) {
        const p = props[key];
        if (p.type === 'title' && p.title) return p.title.map(x => x.plain_text).join('') || '(제목 없음)';
      }
      return '(제목 없음)';
    }

    function getIcon(page) {
      return page.icon?.type === 'emoji' ? page.icon.emoji : null;
    }

    function getLastEdited(page) {
      return new Date(page.last_edited_time).toLocaleDateString('ko-KR', { year: 'numeric', month: 'short', day: 'numeric' });
    }

    function filterPages() {
      const q = document.getElementById('searchInput').value.toLowerCase();
      const type = document.getElementById('typeFilter').value;
      const filtered = allPages.filter(p => {
        const title = getTitle(p).toLowerCase();
        return (!q || title.includes(q)) && (type === 'all' || p.object === type);
      });
      document.getElementById('countBadge').textContent = filtered.length + '개';
      renderPages(filtered);
    }

    function renderPages(pages) {
      displayedPages = pages;
      const grid = document.getElementById('pagesGrid');
      if (!pages.length) {
        grid.innerHTML = '<div class="empty">검색 결과가 없습니다.</div>';
        return;
      }
      grid.innerHTML = pages.map((page, idx) => {
        const title = getTitle(page);
        const icon = getIcon(page);
        const type = page.object;
        const date = getLastEdited(page);
        const iconHtml = icon
          ? `<div class="page-icon">${icon}</div>`
          : `<div class="page-icon"><svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" opacity="0.35"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="7" y1="8" x2="17" y2="8"/><line x1="7" y1="12" x2="14" y2="12"/><line x1="7" y1="16" x2="11" y2="16"/></svg></div>`;
        const badge = type === 'database'
          ? `<span class="badge badge-db">데이터베이스</span>`
          : `<span class="badge badge-page">페이지</span>`;
        return `<div class="page-card" onclick="openPage(${idx})" role="button" tabindex="0" onkeydown="if(event.key==='Enter')openPage(${idx})">
          ${iconHtml}
          <div class="page-title">${esc(title)}</div>
          <div class="page-meta">${badge}<span class="page-date">${date}</span></div>
        </div>`;
      }).join('');
    }

    // ── Navigation ──

    function openPage(idx) {
      const page = displayedPages[idx];
      navStack.length = 0;
      navStack.push({ id: page.id, title: getTitle(page), icon: getIcon(page), url: page.url });
      showDetailPage();
    }

    function navigateToChild(el) {
      navStack.push({ id: el.dataset.id, title: el.dataset.title, icon: el.dataset.icon, url: null });
      showDetailPage();
    }

    function navigateBack() {
      navStack.pop();
      if (navStack.length === 0) {
        closeDetail();
      } else {
        showDetailPage();
      }
    }

    function navigateToCrumb(idx) {
      navStack.splice(idx + 1);
      showDetailPage();
    }

    function closeDetail() {
      navStack.length = 0;
      document.getElementById('pageDetail').classList.remove('open');
      document.body.style.overflow = '';
    }

    async function showDetailPage() {
      const detail = document.getElementById('pageDetail');
      if (!detail.classList.contains('open')) {
        detail.classList.add('open');
        document.body.style.overflow = 'hidden';
      }

      const current = navStack[navStack.length - 1];

      // Scroll to top
      detail.scrollTop = 0;

      // Breadcrumb
      const crumb = document.getElementById('breadcrumb');
      if (navStack.length > 1) {
        crumb.innerHTML = navStack.slice(0, -1).map((item, i) =>
          `<span class="crumb-item" onclick="navigateToCrumb(${i})">${esc(item.title.length > 16 ? item.title.slice(0, 16) + '…' : item.title)}</span>`
        ).join('<span class="crumb-sep"> › </span>') + '<span class="crumb-sep"> › </span>';
      } else {
        crumb.innerHTML = '';
      }

      // Back button label
      const backLabel = document.getElementById('backLabel');
      if (navStack.length === 1) {
        backLabel.textContent = '목록으로';
      } else {
        const prev = navStack[navStack.length - 2];
        const t = prev.title;
        backLabel.textContent = t.length > 20 ? t.slice(0, 20) + '…' : t;
      }

      // Page title & icon
      document.getElementById('detailIcon').textContent = current.icon || '';
      document.getElementById('detailTitle').textContent = current.title;

      // Notion link
      const notionLink = document.getElementById('detailNotionLink');
      if (current.url) {
        notionLink.href = current.url;
        notionLink.style.display = 'flex';
      } else {
        notionLink.style.display = 'none';
      }

      // Load blocks
      const contentEl = document.getElementById('detailContent');
      contentEl.innerHTML = '<div class="detail-loading">불러오는 중…</div>';

      const notionKey = document.getElementById('notionKey').value.trim();
      try {
        const res = await fetch('/api/notion', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ notionKey, action: 'blocks', pageId: current.id }),
        });
        const data = await res.json();
        if (!data.success) throw new Error(data.error || '알 수 없는 오류');
        contentEl.innerHTML = renderBlocks(data.blocks);
      } catch (err) {
        contentEl.innerHTML = `<p class="detail-error">불러오기 실패: ${esc(err.message)}</p>`;
      }
    }

    // ── Block Rendering ──

    function renderRichText(richTexts) {
      return (richTexts || []).map(rt => {
        if (!rt.plain_text) return '';
        let text = esc(rt.plain_text);
        const ann = rt.annotations || {};
        if (ann.code) text = `<code class="inline-code">${text}</code>`;
        if (ann.bold) text = `<strong>${text}</strong>`;
        if (ann.italic) text = `<em>${text}</em>`;
        if (ann.strikethrough) text = `<s>${text}</s>`;
        if (ann.underline) text = `<u>${text}</u>`;
        if (ann.color && ann.color !== 'default') {
          const isBg = ann.color.endsWith('_background');
          const key = ann.color.replace('_background', '');
          const color = NOTION_COLORS[key];
          if (color) {
            text = isBg
              ? `<mark style="background:${color}33;border-radius:2px;padding:1px 3px">${text}</mark>`
              : `<span style="color:${color}">${text}</span>`;
          }
        }
        if (rt.href) text = `<a href="${esc(rt.href)}" target="_blank" rel="noopener noreferrer">${text}</a>`;
        return text;
      }).join('');
    }

    function renderBlocks(blocks) {
      if (!blocks || !blocks.length) return '<p class="detail-empty">내용이 없습니다.</p>';
      const html = [];
      let i = 0;
      while (i < blocks.length) {
        const block = blocks[i];
        if (block.type === 'bulleted_list_item') {
          const items = [];
          while (i < blocks.length && blocks[i].type === 'bulleted_list_item') items.push(blocks[i++]);
          html.push('<ul class="notion-ul">' + items.map(b => {
            const ch = b.children?.length ? `<div class="block-children">${renderBlocks(b.children)}</div>` : '';
            return `<li>${renderRichText(b.bulleted_list_item.rich_text)}${ch}</li>`;
          }).join('') + '</ul>');
        } else if (block.type === 'numbered_list_item') {
          const items = [];
          while (i < blocks.length && blocks[i].type === 'numbered_list_item') items.push(blocks[i++]);
          html.push('<ol class="notion-ol">' + items.map(b => {
            const ch = b.children?.length ? `<div class="block-children">${renderBlocks(b.children)}</div>` : '';
            return `<li>${renderRichText(b.numbered_list_item.rich_text)}${ch}</li>`;
          }).join('') + '</ol>');
        } else if (block.type === 'table') {
          const hasColHeader = block.table?.has_column_header;
          const hasRowHeader = block.table?.has_row_header;
          const rows = (block.children || []).map((row, ri) => {
            if (row.type !== 'table_row') return '';
            const cells = (row.table_row?.cells || []).map((cell, ci) => {
              const tag = (hasColHeader && ri === 0) || (hasRowHeader && ci === 0) ? 'th' : 'td';
              return `<${tag}>${renderRichText(cell)}</${tag}>`;
            }).join('');
            return `<tr>${cells}</tr>`;
          }).join('');
          html.push(`<div class="notion-table-wrap"><table class="notion-table">${rows}</table></div>`);
          i++;
        } else {
          html.push(renderBlock(block));
          i++;
        }
      }
      return html.join('');
    }

    function renderBlock(block) {
      const type = block.type;
      const data = block[type] || {};
      const text = renderRichText(data.rich_text || []);
      const ch = block.children?.length ? `<div class="block-children">${renderBlocks(block.children)}</div>` : '';

      switch (type) {
        case 'paragraph':
          return `<p class="notion-p">${text || '<br>'}</p>${ch}`;
        case 'heading_1':
          return `<h1 class="notion-h1">${text}</h1>${ch}`;
        case 'heading_2':
          return `<h2 class="notion-h2">${text}</h2>${ch}`;
        case 'heading_3':
          return `<h3 class="notion-h3">${text}</h3>${ch}`;
        case 'to_do':
          return `<div class="notion-todo"><input type="checkbox" ${data.checked ? 'checked' : ''} disabled><span class="${data.checked ? 'todo-done' : ''}">${text}</span></div>${ch}`;
        case 'toggle':
          return `<details class="notion-toggle"><summary>${text || '토글'}</summary>${ch}</details>`;
        case 'code': {
          const lang = data.language || '';
          const code = (data.rich_text || []).map(r => r.plain_text).join('');
          return `<pre class="notion-code"${lang ? ` data-lang="${esc(lang)}"` : ''}><code>${esc(code)}</code></pre>`;
        }
        case 'image': {
          const url = data.type === 'external' ? data.external?.url : data.file?.url;
          if (!url) return '';
          const cap = renderRichText(data.caption || []);
          return `<figure class="notion-image"><img src="${esc(url)}" alt="" loading="lazy">${cap ? `<figcaption>${cap}</figcaption>` : ''}</figure>`;
        }
        case 'divider':
          return '<hr class="notion-divider">';
        case 'quote':
          return `<blockquote class="notion-quote">${text}${ch}</blockquote>`;
        case 'callout': {
          const icon = data.icon?.type === 'emoji' ? data.icon.emoji : '💡';
          return `<div class="notion-callout"><span class="callout-icon">${icon}</span><div class="callout-body">${text}${ch}</div></div>`;
        }
        case 'child_page':
          return `<div class="notion-child-page" data-id="${block.id}" data-title="${esc(data.title || '')}" data-icon="📄" onclick="navigateToChild(this)">📄 ${esc(data.title || '(제목 없음)')}</div>`;
        case 'child_database':
          return `<div class="notion-child-page" data-id="${block.id}" data-title="${esc(data.title || '')}" data-icon="🗃️" onclick="navigateToChild(this)">🗃️ ${esc(data.title || '(제목 없음)')}</div>`;
        case 'bookmark': {
          const url = data.url || '';
          const cap = renderRichText(data.caption || []);
          return `<a class="notion-bookmark" href="${esc(url)}" target="_blank" rel="noopener noreferrer">${cap || esc(url)}</a>`;
        }
        case 'link_preview':
          return `<a class="notion-bookmark" href="${esc(data.url || '')}" target="_blank" rel="noopener noreferrer">${esc(data.url || '')}</a>`;
        case 'embed':
          return `<div class="notion-embed"><a href="${esc(data.url || '')}" target="_blank" rel="noopener noreferrer">🔗 ${esc(data.url || '')}</a></div>`;
        case 'video': {
          const url = data.type === 'external' ? data.external?.url : data.file?.url;
          return url ? `<div class="notion-media-link"><a href="${esc(url)}" target="_blank" rel="noopener noreferrer">🎥 동영상 보기</a></div>` : '';
        }
        case 'file': {
          const url = data.type === 'external' ? data.external?.url : data.file?.url;
          const cap = renderRichText(data.caption || []);
          return url ? `<div class="notion-media-link"><a href="${esc(url)}" target="_blank" rel="noopener noreferrer">📎 ${cap || '파일 다운로드'}</a></div>` : '';
        }
        case 'pdf': {
          const url = data.type === 'external' ? data.external?.url : data.file?.url;
          return url ? `<div class="notion-media-link"><a href="${esc(url)}" target="_blank" rel="noopener noreferrer">📄 PDF 보기</a></div>` : '';
        }
        case 'audio': {
          const url = data.type === 'external' ? data.external?.url : data.file?.url;
          return url ? `<audio controls src="${esc(url)}" style="width:100%;margin:8px 0"></audio>` : '';
        }
        case 'equation':
          return `<div class="notion-equation">${esc(data.expression || '')}</div>`;
        case 'column_list':
          return `<div class="notion-columns">${ch}</div>`;
        case 'column':
          return `<div class="notion-column">${ch}</div>`;
        case 'synced_block':
          return ch;
        case 'breadcrumb':
        case 'table_of_contents':
        case 'unsupported':
          return '';
        default:
          return text ? `<p class="notion-p">${text}</p>${ch}` : ch;
      }
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
  </script>
</body>
</html>
